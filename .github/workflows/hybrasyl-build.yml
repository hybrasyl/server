---
name: Hybrasyl packaging and testing

on:
  push:
    paths-ignore:
      - 'contrib/**'
      - '**.md'
      - '.github/**'
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    branches:
      - main
      - develop

permissions:
  packages: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:latest
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    environment: deploy
    
    steps:
      - name: Install prerequisites
        run: sudo apt-get update && sudo apt-get -yy install mono-runtime zip
      - name: Install naturaldocs
        run: >
          curl "https://www.naturaldocs.org/download/natural_docs/2.2/Natural_Docs_2.2.zip" > /tmp/NaturalDocs.zip && 
          cd /tmp && unzip /tmp/NaturalDocs.zip && sudo mv "/tmp/Natural Docs" /usr/local/bin/naturaldocs
      - name: Install dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - name: Check out ceridwen (test data)
        uses: actions/checkout@v3
        with:
          repository: hybrasyl/ceridwen
          path: ceridwen
      - name: Check out server
        uses: actions/checkout@v5
        with:
          path: server
      - name: generate short sha for release filename
        run: echo "SHORT_SHA=`echo ${GITHUB_SHA} | cut -c1-8`" >> $GITHUB_ENV
      - name: Install nuget dependencies
        run: cd $GITHUB_WORKSPACE/server && dotnet restore
      - name: build & run tests
        run: >
          cd $GITHUB_WORKSPACE/server/Hybrasyl.Tests && dotnet test
          --verbosity normal --collect:"XPlat Code Coverage"
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          HYB_WORLD_DIR: ${{ github.workspace }}/ceridwen/xml
      - name: Codecov
        uses: codecov/codecov-action@v4.2.0
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          fail_ci_if_error: true
          verbose: true
      - name: Create release directory
        run: mkdir $RUNNER_TEMP/releases
      - name: Publish Win64
        run: >
          cd $GITHUB_WORKSPACE/server && dotnet publish -c Release -r win-x64 &&
          cd $GITHUB_WORKSPACE/server/hybrasyl/bin/Release/net10.0/win-x64/publish &&
          echo "${SHORT_SHA}" > commit.txt &&
          zip -r $RUNNER_TEMP/releases/HybrasylServer-${SHORT_SHA}-windows.zip .
      - name: Publish Linux
        run: >
          cd $GITHUB_WORKSPACE/server && dotnet publish -c Release -r linux-x64 &&
          cd $GITHUB_WORKSPACE/server/hybrasyl/bin/Release/net10.0/linux-x64/publish &&
          echo "${SHORT_SHA}" > commit.txt &&
          zip -r $RUNNER_TEMP/releases/HybrasylServer-${SHORT_SHA}-linux.zip .
      - name: Publish MacOS
        run: >
          cd $GITHUB_WORKSPACE/server && dotnet publish -c Release -r osx-x64 &&
          cd $GITHUB_WORKSPACE/server/hybrasyl/bin/Release/net10.0/osx-x64/publish &&
          echo "${SHORT_SHA}" > commit.txt &&
          zip -r $RUNNER_TEMP/releases/HybrasylServer-${SHORT_SHA}-osx.zip .
      - name: Upload to current
        run: >
          aws s3 cp $RUNNER_TEMP/releases/HybrasylServer-${SHORT_SHA}-windows.zip
          s3://releases.hybrasyl.com/HybrasylServer-current-windows.zip --region us-east-1 &&
          aws s3 cp $RUNNER_TEMP/releases/HybrasylServer-${SHORT_SHA}-linux.zip
          s3://releases.hybrasyl.com/HybrasylServer-current-linux.zip --region us-east-1 &&
          aws s3 cp $RUNNER_TEMP/releases/HybrasylServer-${SHORT_SHA}-osx.zip
          s3://releases.hybrasyl.com/HybrasylServer-current-osx.zip --region us-east-1
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: Upload to release archive
        run: >
          aws s3 sync $RUNNER_TEMP/releases/ s3://releases.hybrasyl.com/releases/ --region us-east-1
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}      
      - name: Build documentation
        run: >
          cd $GITHUB_WORKSPACE/server && mono /usr/local/bin/naturaldocs/NaturalDocs.exe .ndconfig
      - name: Upload to docs site
        run: >
          aws s3 sync $GITHUB_WORKSPACE/server/.ndoutput s3://docs.hybrasyl.com/ --region us-west-1
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}      
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Determine docker tags
        id: docker-tags
        run: |
          TAGS="ghcr.io/${{ github.repository }}:${{ env.SHORT_SHA }}"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            TAGS="$TAGS
          ghcr.io/${{ github.repository }}:${VERSION}"
          else
            TAGS="$TAGS
          ghcr.io/${{ github.repository }}:latest"
          fi
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "$TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Build and push docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ github.workspace }}/server
          push: true
          tags: ${{ steps.docker-tags.outputs.tags }}
          build-args: |
            GIT_HASH=${{ env.SHORT_SHA }}
      - name: Notify discord
        uses: Ilshidur/action-discord@master
        with:
          args: "Hybrasyl Server: Job ${{ github.run_id }}: success, release artifacts updated (${SHORT_SHA} by ${GITHUB_ACTOR}"
        continue-on-error: true
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      - name: Notify discord of failure
        if: ${{ failure() }}
        uses: Ilshidur/action-discord@master
        with:
          args: "Hybrasyl Server: Job ${{ github.run_id }}: **FAIL**"
        continue-on-error: true
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
